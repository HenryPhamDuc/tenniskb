<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/en/">
    <title>Tennis Knowledge Base</title>
    <link rel="canonical" href="https://henryphamduc.github.io/tenniskb/en/">
</head>
<body>
    <p>Redirecting to <a href="/en/">English version</a> or <a href="/vi/">Vietnamese version</a>...</p>
    <script>
        // Detect language preference
        const lang = navigator.language || navigator.userLanguage;
        if (lang.startsWith('vi')) {
            window.location.href = '/vi/';
        } else {
            window.location.href = '/en/';
        }
    </script>
</body>
</html>
